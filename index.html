<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Odin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="winner-overlay">
        <h1 class="winner__title">Player X Wins!</h1>
        <button onclick="GameManager.reset();">Reset</button>
    </div>
    <header>
        Tic Tac Toe
    </header>
    <div class="game-content">
        <h2 class="current-turn-display">Placeholder Text</h2>

        <div class="grid">
            <!-- Grid for tic tac toe -->
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
        </div>
    </div>
    <footer>
        Made by <a href="https://github.com/ItsStunZ/" target="_blank">StunZ</a> 2026
    </footer>
    <script src="script.js"></script>
</body>
</html>
