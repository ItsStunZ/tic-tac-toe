<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Odin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="winner-overlay">
        <h1 class="winner__title">Player X Wins!</h1>
        <button onclick="GameManager.reset();">Reset</button>
    </div>
    <header>
        Tic Tac Toe
    </header>
    <h2 class="current-turn-display"></h2>
    <div class="game-content">
        <div class="sidebar">
            <div class="scoreboard-container">
                <h2>Scoreboard</h2>
                <hr>
                <p id="scoreboard__playerX">Player X: 0</p>
                <p id="scoreboard__playerO">Player O: 0</p>
            </div>
            <div class="sidebar-btn-container">
                <button onclick="GameManager.reset();">Restart</button>
            </div>
        </div>

        <div class="grid">
            <!-- Grid for tic tac toe -->
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
            <div class="grid__child"></div>
        </div>
    </div>
    <footer>
        Made by <a href="https://github.com/ItsStunZ/" target="_blank">StunZ</a> 2026
    </footer>
    <script src="script.js"></script>
</body>
</html>
